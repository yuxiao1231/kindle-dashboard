name: KDB Release Bot

on:
  push:
    tags:
      - 'v*' # 打 Tag 时自动触发
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-kindle-pkg:
    name: Build Kindle Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release Archive
        run: |
          # 动态获取当前的 Tag 名称 (例如 v1.01)
          VERSION=${{ github.ref_name }}
          # 如果是手动触发没有Tag，则默认叫 v_latest
          if [ "$VERSION" = "main" ]; then VERSION="v_latest"; fi
          
          # 模拟 Kindle extensions 结构
          mkdir -p kdb_$VERSION
          # 拷贝必要文件，排除 tools 和 git 相关
          cp -r bin lib assets main.lua memo.txt README.md LICENSE kdb_$VERSION/
          zip -r kdb-$VERSION-kindle.zip kdb_$VERSION/

      - name: Upload Kindle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kindle-package
          path: kdb-*-kindle.zip

  build-python-tool:
    name: Build Windows Tool
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          cd tools
          pyinstaller --onefile --name kdb_splash_tool splash_tool.py

      - name: Upload Tool Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-tool
          path: tools\dist\kdb_splash_tool.exe

  create-release:
    name: Create GitHub Release
    needs: [build-kindle-pkg, build-python-tool]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # Checkout main so we can push the changelog back

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Auto-update CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          
          # Get commits between prev tag and new tag
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --format="- %s" $PREV_TAG..${{ github.ref_name }})
          else
            COMMITS=$(git log --format="- %s" ${{ github.ref_name }})
          fi
          
          # Build new changelog section
          echo "## [${{ github.ref_name }}] — $(date +%Y-%m-%d)" > temp_cl.md
          echo "" >> temp_cl.md
          echo "### 🤖 Auto-generated from git commits" >> temp_cl.md
          echo "$COMMITS" >> temp_cl.md
          echo "" >> temp_cl.md
          echo "---" >> temp_cl.md
          echo "" >> temp_cl.md
          
          # Prepend to existing CHANGELOG.md (skip the first 4 lines of header)
          head -n 4 CHANGELOG.md > new_cl.md
          cat temp_cl.md >> new_cl.md
          tail -n +5 CHANGELOG.md >> new_cl.md
          mv new_cl.md CHANGELOG.md
          rm temp_cl.md
          
          # Commit and push back to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-update CHANGELOG.md for ${{ github.ref_name }} [skip ci]" || echo "No changes"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kindle-package/kdb-*-kindle.zip
            windows-tool/kdb_splash_tool.exe
          body: |
            ## KDB ${{ github.ref_name }} Release
            
            ### 安装说明 / Installation
            1. 下载 `kdb-${{ github.ref_name }}-kindle.zip`。
            2. 解压并将文件夹放入 Kindle 的 `extensions` 目录。
            3. 修改 `memo.txt` 完成初始化配置。
            
            *(Release notes auto-generated from git commits)*
          draft: false
          prerelease: false
          generate_release_notes: true